openapi: 3.0.0
info:
  title: Stock API
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/register:
    post:
      summary: Register user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
                role: { type: string, enum: [admin, shopper] }
      responses:
        '201':
          description: OK
        '400':
          description: Bad Request

  /auth/login:
    post:
      summary: Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request

  /product:
    get:
      summary: List products
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
    post:
      summary: Create product
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                brand: { type: string }
                category: { type: string }
                price: { type: number }
      responses:
        '201':
          description: OK

  /store:
    get:
      summary: List stores
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
    post:
      summary: Create store
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                district: { type: string }
                address: { type: string }
                phone: { type: string }
                manager: { type: string }
      responses:
        '201':
          description: OK

  /stock:
    get:
      summary: List stocks
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: threshold
          schema:
            type: integer
      responses:
        '200':
          description: OK
    post:
      summary: Add stock
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product: { type: string }
                store: { type: string }
                quantity: { type: integer }
      responses:
        '201':
          description: OK

  /stock/adjust:
    patch:
      summary: Adjust stock
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product: { type: string }
                store: { type: string }
                type: { type: string, enum: [add, remove] }
                quantity: { type: integer }
      responses:
        '200':
          description: OK
        '400':
          description: Error

  /stock/transfer:
    post:
      summary: Transfer stock
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product: { type: string }
                fromStore: { type: string }
                toStore: { type: string }
                quantity: { type: integer }
      responses:
        '200':
          description: OK
        '400':
          description: Error